services:
  - type: web
    name: video-mind
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_STT_MODEL
        value: saaras:v2.5
      - key: CORS_ORIGINS
        sync: false
